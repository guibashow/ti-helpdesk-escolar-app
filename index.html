<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TI Help Desk Escolar</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #eef2f5;
      color: #222;
    }

    .header {
      background: #1e88e5;
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    .section-title {
      margin: 18px 0 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .card {
      background: white;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      resize: none;
      min-height: 90px;
    }

    button {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: #1e88e5;
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1565c0;
    }

    .ticket-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .tag {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: white;
      margin-top: 8px;
    }

    .alta {
      background: #e53935;
    }

    .media {
      background: #fb8c00;
    }

    .baixa {
      background: #43a047;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .logout {
      background: transparent;
      color: #1e88e5;
      border: 2px solid #1e88e5;
      width: auto;
      padding: 8px 14px;
      margin-top: 0;
    }

    .logout:hover {
      background: #1e88e5;
      color: white;
    }
  </style>
</head>
<body>
  <div class="header">TI Help Desk Escolar</div>

  <div class="container">
    <div class="top-bar">
      <div class="section-title" style="margin:0;">Abrir Chamado</div>
      <button class="logout" onclick="sair()">Sair</button>
    </div>

    <div class="card">
      <input type="text" id="nome" placeholder="Nome do solicitante" />
      <input type="text" id="setor" placeholder="Setor / Departamento" />
      <textarea id="problema" placeholder="Descreva o problema"></textarea>

      <select id="prioridade">
        <option value="Baixa">Baixa</option>
        <option value="Média">Média</option>
        <option value="Alta">Alta</option>
      </select>

      <button onclick="abrirChamado()">Abrir Chamado</button>
    </div>

    <div class="section-title">Chamados Registrados</div>

    <div id="listaChamados">
      <div class="card">
        <div class="ticket-title">Professor João - Laboratório</div>
        <div>Computador não liga durante a aula.</div>
        <span class="tag alta">Alta</span>
      </div>

      <div class="card">
        <div class="ticket-title">Coordenação - Administrativo</div>
        <div>Internet instável no setor da coordenação.</div>
        <span class="tag media">Média</span>
      </div>
    </div>
  </div>

  <script>
    function classePrioridade(prioridade) {
      if (prioridade === "Alta") return "alta";
      if (prioridade === "Média") return "media";
      return "baixa";
    }

    function abrirChamado() {
      const nome = document.getElementById("nome").value.trim();
      const setor = document.getElementById("setor").value.trim();
      const problema = document.getElementById("problema").value.trim();
      const prioridade = document.getElementById("prioridade").value;

      if (!nome || !setor || !problema) {
        alert("Preencha todos os campos.");
        return;
      }

      const lista = document.getElementById("listaChamados");

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="ticket-title">${nome} - ${setor}</div>
        <div>${problema}</div>
        <span class="tag ${classePrioridade(prioridade)}">${prioridade}</span>
      `;

      lista.prepend(card);

      document.getElementById("nome").value = "";
      document.getElementById("setor").value = "";
      document.getElementById("problema").value = "";
      document.getElementById("prioridade").value = "Baixa";

      alert("Chamado registrado com sucesso.");
    }

    function sair() {
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
