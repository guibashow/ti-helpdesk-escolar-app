<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TI Help Desk Escolar</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #1e88e5, #1565c0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      border-radius: 18px;
      padding: 28px 22px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #1565c0;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 22px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #1e88e5;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1565c0;
    }

    .info {
      margin-top: 14px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">TI Help Desk Escolar</div>
    <div class="subtitle">Acesso ao sistema de chamados</div>

    <input type="text" placeholder="Usuário" />
    <input type="password" placeholder="Senha" />

    <button onclick="entrar()">Entrar</button>

    <div class="info">Protótipo acadêmico para ambiente escolar</div>
  </div>

  <script>
    function entrar() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
